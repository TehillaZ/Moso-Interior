
    <!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm rounded-4 p-4">
                <h2 class="text-center text-success mb-4">payment form</h2>
                <div class="text-center mb-4 fs-5 fw-bold">
                   total payment :  <span id="total-sum">0</span>
                </div>
                <form id="payment-form" autocomplete="off">
                    <div class="mb-3">
                        <label for="name" class="form-label">credit-card owner</label>
                        <input type="text" class="form-control" id="name" required placeholder="">
                    </div>
                    <div class="mb-3">
                        <label for="card-number" class="form-label">credit-card number</label>
                        <input type="tel" class="form-control" id="card-number" inputmode="numeric" autocomplete="cc-number" pattern="\d{13,19}" maxlength="19" required placeholder="1234567890123456">
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col">
                            <label for="expiry" class="form-label">(MM/YY) Expiration</label>
                            <input type="text" class="form-control" id="expiry" required pattern="\d{2}/\d{2}" maxlength="5" placeholder="12/29" autocomplete="cc-exp">
                        </div>
                        <div class="col">
                            <label for="cvv" class="form-label">CVV code</label>
                            <input type="tel" class="form-control" id="cvv" required pattern="\d{3,4}" maxlength="4" autocomplete="cc-csc" placeholder="123">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">email</label>
                        <input type="email" class="form-control" id="email" required placeholder="your@email.com">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold">pay now</button>
                </form>
            </div>
        </div>
    </div>
</div>



    <script>
        
document.getElementById('payment-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    try {
     
        //  Fetch cart from server
        const cartRes = await fetch(`http://localhost:3284/cart/view`, {
            method: 'GET',
           credentials:"include"
        });

        if (!cartRes.ok) {
            alert('Failed to get cart');
            return;
        }

        const cart = await cartRes.json();
        if (!cart.length) {
            alert('Your cart is empty');
            return;
        }
        console.log(cart);
        

        //  Calculate final price and prepare products array
        let finalPrice = 0;
        const products = cart.map(item => {
            const quantity = item.quantity || 1;
            finalPrice += (item.productId.price || 0) * quantity;
            return { productId: item.productId._id, quantity };
        });

        //  Prepare order object
        const email = document.getElementById('email').value;
        const order = { email, products, finalPrice };

        //  Send order to server
        const orderRes = await fetch('http://localhost:3284/order', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('accessToken')
            },
            body: JSON.stringify(order)
        });

        const orderData = await orderRes.json();
        console.log('Order response:', orderData);

        if (orderRes.ok) {
            alert("Payment received, thank you for buying 😃");
            window.location.href = "../index.html";
        } else {
            alert('Saving error, try again');
        }

    } catch (err) {
        console.error(err);
        alert('Server error');
    }
});



    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
